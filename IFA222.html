function esc(s){ return String(s); }

function badge(text, color, small){
  return `<span class="badge${small?' small':''}" style="background:${color}20;color:${color};border:1px solid ${color}50;">${text}</span>`;
}

function statCard(value, label, sub, color){
  return `<div class="statcard" style="border:1px solid ${color}40;">
    <div class="val" style="color:${color};">${value}</div>
    <div class="lbl">${label}</div>
    ${sub? `<div class="sub">${sub}</div>` : ''}
  </div>`;
}

let barCounter = 0;
const pendingBars = [];
function animatedBar(value, max, color, delay){
  const id = 'bar_' + (barCounter++);
  pendingBars.push({ id, value, max, delay: delay||0 });
  return `<div class="bar-track"><div class="bar-fill" id="${id}" style="background:${color};"></div></div>`;
}
function runPendingBars(){
  const bars = pendingBars.splice(0, pendingBars.length);
  bars.forEach(b => {
    const el = document.getElementById(b.id);
    if(!el) return;
    setTimeout(() => { el.style.width = ((b.value / b.max) * 100) + '%'; }, b.delay + 100);
  });
}

function topicCard(t, selected){
  const total = t.appearances.filter(Boolean).length;
  const pct = Math.round((total/13)*100);
  const tierColor = t.tier===1?"#DC2626":t.tier===2?"#D97706":"#6366F1";
  return `<div class="topiccard" data-topic-id="${t.id}" style="${selected? `background:${t.color}15;border-color:${t.color};` : ''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
      <div style="font-size:13px;font-weight:700;color:${selected? t.color : '#e2e8f0'};line-height:1.3;">${t.label}</div>
      ${badge(pct+'%', t.color, true)}
    </div>
    <div style="font-size:11px;color:#64748b;margin-bottom:8px;">${t.std}</div>
    ${animatedBar(total, 13, t.color)}
    <div style="display:flex;justify-content:space-between;margin-top:6px;">
      <span style="font-size:10px;color:#475569;">${total}/13 exams</span>
      ${badge('Tier '+t.tier, tierColor, true)}
    </div>
  </div>`;
}

function topicDetail(t){

  }
  const nonZeroMarks = t.marks.filter(Boolean);
  return `<div class="fade">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <div style="width:14px;height:14px;border-radius:50%;background:${t.color};flex-shrink:0;"></div>
      <div style="font-size:20px;font-weight:800;color:#f1f5f9;font-family:'Playfair Display',serif;">${t.label}</div>
      ${badge(t.std, t.color)}

        </div>
        <div style="font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:8px;line-height:1.3;">${e.topic}</div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:10px;">
          <span>⏱ ${e.time}</span>
          <span>ROI: ${e.roi}%</span>
        </div>
        <div style="background:#1e293b;border-radius:8px;height:8px;overflow:hidden;">
          <div style="height:100%;border-radius:8px;background:linear-gradient(90deg,${e.color},${e.color}80);width:${e.roi}%;transition:width 1s ease;"></div>
        </div>
      </div>`).join('')}
    </div>
    <div style="background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:22px 26px;margin-bottom:20px;">
      <div style="font-size:14px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;">Projected Score — 80/20 Scenario</div>
      <div style="display:grid;gap:10px;">
        ${rows.map(([l,c,earned,total]) => `<div style="display:flex;align-items:center;gap:12px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0;"></div>
          <div style="width:260px;font-size:12px;color:#94a3b8;flex-shrink:0;">${l}</div>
          <div style="flex:1;background:#1e293b;border-radius:6px;height:10px;overflow:hidden;">
            <div style="height:100%;background:${c};border-radius:6px;width:${(earned/20)*100}%;transition:width 1s ease;"></div>
          </div>
          <div style="width:50px;font-size:12px;font-weight:700;color:${c};text-align:right;flex-shrink:0;">${earned}M</div>
        </div>`).join('')}
      </div>
      <div style="margin-top:18px;padding-top:16px;border-top:1px solid #1e293b;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:13px;color:#64748b;">Top 6 topics total</div>
            <div style="font-size:11px;color:#475569;margin-top:2px;">+ Medium topics at 60% ≈ +12–15M</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:32px;font-weight:800;color:#10b981;font-family:'Playfair Display',serif;">54M</div>
            <div style="font-size:12px;color:#10b981;">→ 66–70M total ✓ PASS</div>
          </div>
        </div>
      </div>
    </div>
    <div style="background:linear-gradient(135deg,#0c4a6e,#0f172a);border:1px solid #0891b230;border-radius:16px;padding:20px 24px;">
      <div style="font-size:14px;font-weight:700;color:#38bdf8;margin-bottom:14px;">⚡ 5 Actions Worth ~55 Marks (26 Hours Total)</div>
      ${actions.map(([n,a,r]) => `<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;">
        <div style="width:26px;height:26px;border-radius:8px;background:#0891b220;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#38bdf8;flex-shrink:0;">${n}</div>
        <div style="flex:1;font-size:13px;color:#e2e8f0;font-weight:500;">${a}</div>
        <div style="font-size:11px;color:#10b981;flex-shrink:0;">${r}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderMcq(){
  const mem = [
    ["PIDTFAR→IAS38","Probable, Intention, Demonstrated ability, Technical feasibility, Financial resources, Adequate resources, Reliable measurement → Development capitalisation criteria"],
    ["CIDAP→IFRS15","Contract → Identify POs → Determine price → Allocate → Perform → Five-step revenue model"],
    ["POB→IAS37","Present Obligation + probable Outflow + reliable Best estimate → Provision recognition criteria"],
    ["AHMS→IFRS5","Available now + Highly probable + Management committed + Suitable for sale → Held-for-sale criteria"],
    ["DEAR→Essays","Define + Explain rule + Apply to scenario + Recommend/conclude → Perfect essay structure every time"],
  ];
  return `<div class="fade">
    <div style="font-size:24px;font-weight:800;font-family:'Playfair Display',serif;color:#f1f5f9;margin-bottom:6px;">MCQ Answer Key</div>
    <div style="font-size:12px;color:#475569;margin-bottom:16px;">Correct answers from all old-format sittings (2022–2024). Note: New format (2025+) has no MCQs.</div>
    <div style="background:#dc262610;border:1px solid #dc262630;border-radius:12px;padding:10px 14px;margin-bottom:20px;font-size:12px;color:#fca5a5;">
      ⚠️ The new exam format (May 2025 onwards) has NO Section A MCQs. These answers are for historical practice and theory revision only.
    </div>
    <div style="display:grid;gap:8px;">
      ${DATA.mcqAnswers.map(m => `<div style="background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:12px 16px;display:grid;grid-template-columns:110px 70px 1fr 1fr;gap:10px;align-items:center;">
        <div style="font-size:11px;font-weight:700;color:#818cf8;">${m.exam}</div>
        <div style="font-size:11px;color:#475569;">${m.ref}</div>
        <div style="font-size:12px;color:#94a3b8;">${m.topic}</div>
        <div style="font-size:12px;font-weight:600;color:#86efac;background:#10b98115;border:1px solid #10b98130;border-radius:8px;padding:3px 10px;">${m.answer}</div>
      </div>`).join('')}
    </div>
    <div style="margin-top:24px;background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:20px 24px;">
      <div style="font-size:14px;font-weight:700;color:#a78bfa;margin-bottom:14px;">🧠 Memorisation Methods</div>
      <div style="display:grid;gap:10px;">
        ${mem.map(([k,v]) => `<div style="display:flex;gap:12px;align-items:flex-start;">
          <div style="background:#4f46e520;border:1px solid #4f46e540;border-radius:8px;padding:3px 9px;font-size:11px;font-weight:800;color:#a78bfa;flex-shrink:0;white-space:nowrap;">${k}</div>
          <div style="font-size:12px;color:#94a3b8;">${v}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function renderTab(){
  switch(state.tab){
    case 'dashboard': return renderDashboard();
    case 'frequency': return renderFrequency();
    case 'heatmap': return renderHeatmap();
    case 'topics': return renderTopics();
    case 'predictions': return renderPredictions();
    case 'studyplan': return renderStudyPlan();
    case 'mistakes': return renderMistakes();
    case '8020': return render8020();
    case 'mcq': return renderMcq();
    default: return '';
  }
}

function render(){
  barCounter = 0;
  pendingBars.length = 0;
  const root = document.getElementById('root');
  root.innerHTML = `
    ${renderHeader()}
    ${renderNav()}
    <div style="max-width:1400px;margin:0 auto;padding:24px 24px 40px;">
      ${renderTab()}
    </div>
  `;
  attachEvents();
  runPendingBars();
}

function attachEvents(){
  document.querySelectorAll('[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.tab = btn.getAttribute('data-tab');
      render();
      window.scrollTo({ top: 0, behavior: 'auto' });
    });
  });
  document.querySelectorAll('[data-topic-id]').forEach(card => {
    card.addEventListener('click', () => {
      state.selectedTopicId = card.getAttribute('data-topic-id');
      render();
    });
  });
  document.querySelectorAll('[data-goto-topic]').forEach(card => {
    card.addEventListener('click', () => {
      state.tab = 'topics';
      state.selectedTopicId = card.getAttribute('data-goto-topic');
      render();
    });
  });
}

render();
</script>
</body>
</html>
